apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web-ui
  labels:
    app: frontend-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-web-ui
  template:
    metadata:
      labels:
        app: frontend-web-ui
    spec:
      containers:
      - name: web-ui
        image: nginx:1.25
        ports:
        - containerPort: 80
        env:
        - name: ENV
          value: "dev"