apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-worker
  template:
    metadata:
      labels:
        app: orders-worker
    spec:
      containers:
      - name: worker
        image: busybox
        command: ["sh", "-c", "while true; do echo processing; sleep 10; done"]