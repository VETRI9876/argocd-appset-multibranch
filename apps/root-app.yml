apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: argo-project
  source:
    repoURL: https://github.com/VETRI9876/argocd-appset-multibranch.git
    targetRevision: main
    path: apps 
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true